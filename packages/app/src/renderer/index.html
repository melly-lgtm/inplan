<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- A runtime plugin (when entitled): the renderer imports the verified bundle main serves over
         the privileged inplan-plugin: scheme (script-src), and the plugin may connect to an
         editor-hosted loopback endpoint (connect-src ws://127.0.0.1). Both are inert on the base /
         no-plugin path (main exposes nothing to import + runs no plugin). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' inplan-plugin:; connect-src 'self' inplan-plugin: ws://127.0.0.1:* ws://localhost:*; frame-src https://inplan.ai http://127.0.0.1:* http://localhost:*"
    />
    <title>inplan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
