# Publish the `inplan` package to npm via OIDC Trusted Publishing — no long-lived token.
#
# Setup (one-time, on npmjs.com → the `inplan` package → Settings → Trusted Publisher →
# Add GitHub Actions): owner `melly-lgtm`, repository `inplan`, workflow `release.yml`.
# Then publishing happens here, authenticated by GitHub's OIDC token (id-token: write) —
# no NPM_TOKEN. Provenance attestation is attached automatically.
#
# To release: bump the version in packages/cli/package.json (the CLI reads its --version
# from package.json at runtime, so that's the only place), then publish a GitHub Release
# (or run this workflow manually). npm versions are immutable, so the version must be new
# or `npm publish` will fail.

name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the "Environment name" set on npm's Trusted Publisher config (`release`),
    # or the OIDC token's environment claim won't match and npm rejects it (→ ENEEDAUTH).
    environment: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          # NOTE: intentionally NO `registry-url` — it makes setup-node write an empty
          # `//registry.npmjs.org/:_authToken=` into .npmrc, which npm reads as "auth already
          # configured" and SKIPS OIDC trusted publishing (→ ENEEDAUTH). Without it, npm uses
          # the default registry and the OIDC flow (id-token below) authenticates the publish.
      # Trusted publishing + provenance need a recent npm CLI.
      - run: npm install -g npm@latest
      - run: npm ci
      # Assemble release/ (CLI bundle + bundled Electron app + skill + generated package.json).
      # INPLAN_POSTHOG_KEY is PostHog's public, write-only ingest key (project 458336, US Cloud) —
      # safe to embed in client bundles. electron.vite.config.ts bakes it into the main bundle so
      # opt-in telemetry has an endpoint in published builds; telemetry stays off unless the user
      # enables it. Rotate by editing this value (or set a repo Variable and reference it here).
      - run: node scripts/build-release.mjs
        env:
          INPLAN_POSTHOG_KEY: phc_sMdbuR25hr6Ae59GZQwiDLf2DRxaoUVEmu6KsoU6bCFh
      - name: Publish (OIDC trusted publisher)
        working-directory: release
        run: npm publish --provenance --access public
