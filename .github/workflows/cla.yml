# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CLA enforcement via cla-assistant (contributor-assistant/github-action).
#
# Setup required before this works:
#   1. Create a repo secret `CLA_PAT` — a Personal Access Token (repo scope)
#      for an account that can write to the signatures store below.
#   2. The action will create/maintain `signatures/cla.json` on the default
#      branch to record who has signed.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # SHA-pinned (not a mutable tag): this action has contents/PR write + a PAT,
        # and the upstream repo is archived, so a force-pushed tag must not be able
        # to swap in malicious code. ca4a40a = v2.6.1 — the LAST release (the repo is
        # archived), so the "Node.js 20 actions are deprecated" warning it emits can't
        # be cleared by bumping: there is no Node-24 release to move to. We keep the
        # pin (security > the non-fatal warning) until we migrate to a maintained fork.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/melly-lgtm/inplan/blob/main/CLA.md'
          # Store signatures on a DEDICATED, unprotected branch — NOT main. The action commits the
          # signature file directly (it has no PR flow), but main now has a ruleset requiring PRs, so
          # writing to main was rejected ("Changes must be made through a pull request") and external
          # contributors' signatures never recorded → the CLA check stayed red. cla-signatures is
          # outside that ruleset, so the bot can persist signatures again.
          branch: 'cla-signatures'
          # The company's own maintainer account is the licensor, not a third-party
          # contributor — it doesn't sign its own CLA. External contributors still must.
          allowlist: 'melly-lgtm,dependabot[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thanks for your PR! Before we can merge it, please sign our [Contributor License Agreement](https://github.com/melly-lgtm/inplan/blob/main/CLA.md) by commenting below:'
