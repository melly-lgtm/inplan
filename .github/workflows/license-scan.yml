# SPDX-License-Identifier: AGPL-3.0-or-later
#
# License / provenance gate. Two free, open-source scanners guard against
# inadvertently shipping code under licenses that are incompatible with the
# project's AGPL-3.0 + commercial dual-licensing (which is what makes the IP
# sellable):
#
#   1. dependency-licenses — fails the build if any production dependency is
#      under a non-permissive (copyleft / unknown) license. Strong copyleft in a
#      dependency would block offering a proprietary commercial license.
#   2. source-license-scan — runs ScanCode Toolkit over our own source and fails
#      if it detects license/copyright clues that aren't ours (AGPL) or plainly
#      permissive — the closest free signal that a snippet was copied in from a
#      differently-licensed open-source project.
#
# NOTE: this is a best-effort *free* gate. True snippet-level "similarity to a
# specific OSS project" detection needs a commercial corpus (FOSSA / Black Duck);
# see docs/PLAN.md § Licensing & IP. The allowlists below are intentionally
# explicit and meant to be tuned on the first few runs.
#
# Actions are pinned to immutable commit SHAs (with the version tag in a comment),
# matching .github/workflows/cla.yml — mutable tags can be force-pushed to malicious code.
name: License & provenance scan

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Fail on non-permissive dependency licenses
        # Scan the full installed dependency graph and fail on anything that
        # isn't permissive, so the commercial relicense stays clean. Our own
        # @inplan/* workspace packages are AGPL and marked "private": true, so
        # --excludePrivatePackages drops them (they'd otherwise trip the AGPL
        # check). We intentionally do NOT pass --production: from the private
        # monorepo root that scans nothing and passes vacuously. The trade-off
        # is that build/dev tooling is scanned too — a future copyleft dev-only
        # tool would trip this; allow it via --onlyAllow or --excludePackages.
        run: |
          npx --yes license-checker-rseidelsohn \
            --excludePrivatePackages \
            --onlyAllow "MIT;MIT-0;ISC;0BSD;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;Unlicense;BlueOak-1.0.0;Python-2.0;Zlib;CC-BY-4.0;WTFPL" \
            --summary

  source-license-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Install ScanCode Toolkit
        run: pip install --upgrade "scancode-toolkit==32.*"
      - name: Scan source for license & copyright clues
        run: |
          scancode --license --copyright --strip-root --json-pp scancode.json \
            --ignore "*/node_modules/*" --ignore "*/dist/*" --ignore "*/out/*" \
            --ignore "*.lock" --ignore "package-lock.json" \
            packages skill LICENSE NOTICE
      - name: Fail on foreign / non-permitted license detections
        run: python3 .github/scripts/check_scancode_licenses.py scancode.json
      - name: Upload ScanCode report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: scancode-report
          path: scancode.json
