# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Continuous-integration gate. Every push and pull request must build, type-check
# and pass the unit tests before it can be merged — the license/provenance scan
# (license-scan.yml) and CLA check (cla.yml) run alongside this.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    # CI builds + tests but never launches Electron, so skip the (sometimes-flaky, ~100MB)
    # Electron binary download during install — a CDN 504 there shouldn't fail the build.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Guard against a stale lockfile: `npm ci` tolerates a workspace self-version mismatch, so a
      # hand-edited version bump can leave package-lock behind (it drifted 0.1.6→0.1.10 once).
      - run: npm run check:lockfile
      # Build first so cross-package imports (cli/app → @inplan/core dist) resolve
      # for the type-check and test steps.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
