# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Continuous-integration gate. Every push and pull request must build, type-check
# and pass the unit tests before it can be merged — the license/provenance scan
# (license-scan.yml) and CLA check (cla.yml) run alongside this.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Build first so cross-package imports (cli/app → @inplan/core dist) resolve
      # for the type-check and test steps.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
